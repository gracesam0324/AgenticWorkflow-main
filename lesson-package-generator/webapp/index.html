<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4F46E5" />
  <title>수업안 패키지 생성기</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- Fixed header -->
  <header class="app-header">
    <div class="app-header__title">
      <span class="app-header__logo">✝</span>
      <span>수업안 패키지 생성기</span>
    </div>
    <button id="settingsBtn" class="icon-btn" aria-label="설정" title="API 키 설정">⚙️</button>
  </header>

  <main class="app-content">
    <!-- ===== Input ===== -->
    <section id="inputSection" class="page-enter">
      <div class="card">
        <h2 class="card__title">새 수업안 만들기</h2>
        <p class="card__sub">본문·테마·대상·분량을 입력하면 수업안과 부가물(교보재·찬양·홍보영상)을 한 번에 생성합니다.</p>

        <form id="genForm" autocomplete="off">
          <label class="field">
            <span class="field__label">본문 <em>*</em></span>
            <textarea id="bodyText" rows="4" placeholder="예) 누가복음 8:26-39 — 거라사 군대귀신 들린 사람을 고치신 사건. 본문 전체나 요약을 붙여넣어도 됩니다." required></textarea>
          </label>

          <label class="field">
            <span class="field__label">테마 / 강조점 <em>*</em></span>
            <input id="theme" type="text" placeholder="예) 자유 / 은혜 / 회복" required />
          </label>

          <div class="field-row">
            <label class="field">
              <span class="field__label">대상 <em>*</em></span>
              <input id="audience" type="text" placeholder="예) 중등부 20명" required />
            </label>
            <label class="field">
              <span class="field__label">분량(분) <em>*</em></span>
              <input id="volume" type="text" inputmode="numeric" placeholder="예) 80" required />
            </label>
          </div>

          <fieldset class="supp">
            <legend>부가물 선택</legend>
            <label class="chk"><input type="checkbox" id="optTeaching" checked /> 교보재</label>
            <label class="chk"><input type="checkbox" id="optPraise" checked /> 찬양</label>
            <label class="chk"><input type="checkbox" id="optPromo" checked /> 홍보영상</label>
          </fieldset>

          <button type="submit" id="generateBtn" class="btn btn--primary btn--block">✨ 생성하기</button>
        </form>
      </div>
    </section>

    <!-- ===== Progress ===== -->
    <section id="progressSection" hidden>
      <div class="card">
        <h2 class="card__title">생성 진행 상황</h2>
        <ul id="progressList" class="progress"></ul>
        <button id="cancelBtn" class="btn btn--ghost btn--block" hidden>처음으로</button>
      </div>
    </section>

    <!-- ===== Results ===== -->
    <section id="resultSection" hidden>
      <div class="card result-head">
        <div>
          <h2 class="card__title" id="resultTitle">수업안 패키지</h2>
          <p class="card__sub" id="resultMeta"></p>
        </div>
        <div class="result-actions">
          <button id="downloadAllBtn" class="btn btn--ghost">⬇ 전체(JSON)</button>
          <button id="newBtn" class="btn btn--ghost">＋ 새로 만들기</button>
        </div>
      </div>

      <!-- Tabs -->
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="plan">수업안</button>
        <button class="tab" data-tab="teaching">교보재</button>
        <button class="tab" data-tab="praise">찬양</button>
        <button class="tab" data-tab="promo">홍보영상</button>
        <button class="tab" data-tab="check">자기검수</button>
      </nav>

      <div class="tab-panel" id="panel-plan"></div>
      <div class="tab-panel" id="panel-teaching" hidden></div>
      <div class="tab-panel" id="panel-praise" hidden></div>
      <div class="tab-panel" id="panel-promo" hidden></div>
      <div class="tab-panel" id="panel-check" hidden></div>
    </section>
  </main>

  <!-- ===== Settings modal ===== -->
  <div id="settingsModal" class="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__box glass-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <h2 id="settingsTitle" class="card__title">설정</h2>
      <label class="field">
        <span class="field__label">Anthropic API 키</span>
        <input id="apiKeyInput" type="password" placeholder="sk-ant-..." autocomplete="off" />
        <span class="field__hint">키는 이 브라우저(localStorage)에만 저장되며 서버로 전송되지 않습니다. <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">키 발급 →</a></span>
      </label>
      <label class="field">
        <span class="field__label">모델</span>
        <select id="modelSelect">
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (권장·빠름)</option>
          <option value="claude-opus-4-8">Claude Opus 4.8 (최고 품질·느림)</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (경량)</option>
        </select>
      </label>
      <div class="modal__actions">
        <button id="settingsClose" class="btn btn--ghost" data-close>닫기</button>
        <button id="settingsSave" class="btn btn--primary">저장</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="./js/prompts.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/selfcheck.js"></script>
  <script src="./js/render.js"></script>
  <script src="./js/pipeline.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
