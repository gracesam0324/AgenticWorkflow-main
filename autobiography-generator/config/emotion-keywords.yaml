  keywords:
    - "그리움"
    - "아픔"
    - "슬픔"
    - "눈물"
    - "한숨"
    - "외로움"
    - "쓸쓸"
    - "서러움"
    - "아쉬움"
    - "후회"
    - "그립다"
    - "서럽다"
    - "외롭다"
    - "쓸쓸하다"
    - "눈시울"
    - "가슴이 아프"
    - "목이 메"
    - "허전"
    - "막막"
    - "답답"
  weight: 1.0

