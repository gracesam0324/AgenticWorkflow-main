# EPUB Metadata Template — Dublin Core + Pandoc Extensions
# Populate these fields before running the build script.
# Fields marked (required) must be filled; others are optional.
#
# Reference: https://pandoc.org/MANUAL.html#epub-metadata
# Dublin Core: https://www.dublincore.org/specifications/dublin-core/

# === Required ===
title: "BOOK_TITLE_HERE"
author:
  - "AUTHOR_NAME_HERE"
date: "2026"
lang: en-US

# === Recommended (for bookstore listings / catalogs) ===
subtitle: ""
description: |
  A brief description of the autobiography for bookstore listings
  and library catalogs. 2-3 sentences that capture the essence of
  the story. This appears in EPUB metadata and online stores.
subject:
  - "Biography & Autobiography / Personal Memoirs"
  - "Biography & Autobiography / Cultural, Ethnic & Regional"
publisher: ""
rights: "All rights reserved"

# === Identifiers ===
isbn: ""
# identifier:
#   - scheme: ISBN
#     text: "978-0-000000-00-0"
#   - scheme: UUID
#     text: "urn:uuid:xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# === Cover Image ===
# Recommended: 1600 x 2560 px (1:1.6 ratio) JPEG
# Minimum: 625 x 1000 px
cover-image: ""

# === Stylesheet ===
css: "templates/epub.css"

# === Front Matter ===
dedication: ""
epigraph: ""
epigraph-author: ""
foreword: ""
preface: ""

# === Back Matter ===
acknowledgments: ""
afterword: ""
timeline: ""
about-author: ""
colophon: "This book was typeset using Pandoc and XeLaTeX with the memoir document class."

# === Build Options ===
toc: true
toc-depth: 1
number-sections: false

# === CJK Support ===
# Set to true if the book contains Korean (or other CJK) text
cjk: false

# === Print-Specific ===
# Used by memoir-print.latex for KDP/IngramSpark
# Inner margin depends on page count:
#   24-150 pages:  0.375in
#   151-300 pages: 0.5in (or 0.75in for comfort)
#   301-500 pages: 0.625in (or 0.875in)
#   501-700 pages: 0.75in (or 1.0in)
# inner-margin: "0.75in"

# === Typography Options ===
# line-stretch: "1.15"          # line spacing multiplier
# microtypography: true         # enable microtype (subtle quality improvement)
# graphics-path: "assets/photos/"

# === Bibliography (optional) ===
# bibliography: "references.bib"
# csl: "chicago-note-bibliography.csl"
# link-citations: true
